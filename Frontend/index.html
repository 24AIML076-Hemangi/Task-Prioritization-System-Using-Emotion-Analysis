<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Prioritization System</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f6f7fb;
        color: #1c2434;
      }
      .page {
        max-width: 900px;
        margin: 0 auto;
        padding: 64px 24px 72px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 36px;
        letter-spacing: 0.3px;
      }
      p {
        margin: 0 0 12px;
        line-height: 1.6;
        font-size: 16px;
      }
      .actions {
        margin-top: 28px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
      }
      .hero {
        display: flex;
        align-items: center;
        gap: 18px;
        flex-wrap: wrap;
      }
      .hero-logo {
        width: 180px;
        height: 180px;
        object-fit: contain;
      }
      .btn {
        display: inline-block;
        text-decoration: none;
        background: #1d4ed8;
        color: #fff;
        padding: 12px 20px;
        border-radius: 10px;
        font-weight: 600;
      }
      .privacy-link {
        color: #1d4ed8;
        font-weight: 600;
        text-decoration: none;
      }
      .card {
        margin-top: 28px;
        background: #ffffff;
        border-radius: 14px;
        padding: 20px 22px;
        box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="hero">
        <img class="hero-logo" src="/logo.png" alt="Task Prioritization System logo" />
        <h1>Task Prioritization System</h1>
      </div>
      <p>This app uses emotion analysis and AI to prioritize tasks effectively.</p>

      <div class="actions">
        <a class="btn" href="/login.html">Go to Login</a>
        <a class="privacy-link" href="/privacy.html">Privacy Policy</a>
      </div>

      <section class="card">
        <p>
          The homepage is publicly accessible for Google OAuth verification. No login is required
          to view this page or the privacy policy.
        </p>
      </section>
    </main>
  </body>
</html>
